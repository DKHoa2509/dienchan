<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mimie Music</title>
    <meta name="description" content="Giao diện nghe nhạc MP3 một màn hình cho mobile." />
    <meta name="theme-color" content="#f4dca5" />
    <meta property="og:title" content="Mimie Music" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/images/anhnen.png" />
    <link rel="preload" href="assets/images/anhnen.png" as="image" />
    <link rel="preload" href="assets/audio/nhacnen.mp3" as="audio" type="audio/mpeg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="music-screen" aria-label="Trình nghe nhạc">
      <img class="page-bg" src="assets/images/anhnen.png" alt="" aria-hidden="true" />
      <div class="romance-layer" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <section class="top-area" aria-label="Điều hướng">
        <button class="glass-button" type="button" aria-label="Thu nhỏ">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </button>
        <div class="screen-title">
          <p>Đang phát</p>
          <span>Nhạc yêu thích</span>
        </div>
        <button class="glass-button" type="button" aria-label="Danh sách">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 7h10" />
            <path d="M9 12h10" />
            <path d="M9 17h10" />
            <path d="M5 7h.01" />
            <path d="M5 12h.01" />
            <path d="M5 17h.01" />
          </svg>
        </button>
      </section>

      <section class="artwork-wrap" aria-label="Ảnh nền bài nhạc">
        <div class="artwork-card">
          <img src="assets/images/anhnen.png" alt="Ảnh nền vàng có đôi bạn ngồi dưới tán cây" />
        </div>
        <button class="heart-button active" type="button" aria-label="Yêu thích">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 21s-7-4.4-9.3-9.2C.8 7.7 3.2 4 7.1 4c2 0 3.4 1 4.9 2.8C13.5 5 14.9 4 16.9 4c3.9 0 6.3 3.7 4.4 7.8C19 16.6 12 21 12 21z" />
          </svg>
        </button>
      </section>

      <section class="playback-area" aria-label="Điều khiển phát nhạc">
        <p class="sr-status" id="statusText">Chạm nút Play để bắt đầu nghe.</p>

        <button class="more-button" type="button" aria-label="Tùy chọn">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8h.01" />
            <path d="M12 12h.01" />
            <path d="M12 16h.01" />
          </svg>
        </button>

        <div class="progress-group">
          <input
            id="seekBar"
            class="seek-bar"
            type="range"
            min="0"
            max="100"
            value="0"
            step="0.1"
            aria-label="Tua nhạc"
          />
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>

        <div class="main-controls">
          <button class="flat-button" type="button" aria-label="Phát ngẫu nhiên">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 3h5v5" />
              <path d="M4 20 21 3" />
              <path d="M21 16v5h-5" />
              <path d="m15 15 6 6" />
              <path d="M4 4l5 5" />
            </svg>
          </button>
          <button class="round-button" id="replayButton" type="button" aria-label="Phát lại từ đầu">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 6v12" />
              <path d="m17 6-8 6 8 6V6z" />
            </svg>
          </button>
          <button class="play-button" id="playButton" type="button" aria-label="Phát nhạc">
            <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 5h4v14H7zM13 5h4v14h-4z" />
            </svg>
          </button>
          <button class="round-button" type="button" aria-label="Bài tiếp theo">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m7 6 8 6-8 6V6z" />
              <path d="M17 6v12" />
            </svg>
          </button>
          <button class="flat-button active" id="loopButton" type="button" aria-label="Loop đang bật">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 2l4 4-4 4" />
              <path d="M3 11V9a3 3 0 0 1 3-3h15" />
              <path d="M7 22l-4-4 4-4" />
              <path d="M21 13v2a3 3 0 0 1-3 3H3" />
            </svg>
          </button>
        </div>
      </section>

      <section class="bottom-dock" aria-label="Âm lượng và menu">
        <div class="volume-row">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10v4h4l5 4V6L8 10H4z" />
          </svg>
          <input id="volumeBar" class="volume-bar" type="range" min="0" max="1" step="0.01" value="0.75" aria-label="Âm lượng" />
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 10v4h4l5 4V6L8 10H4z" />
            <path d="M16 8a5 5 0 0 1 0 8" />
            <path d="M18.5 5.5a9 9 0 0 1 0 13" />
          </svg>
          <span class="divider"></span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18V5l11-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="17" cy="16" r="3" />
          </svg>
        </div>
        <nav class="tab-row" aria-label="Menu">
          <a class="active" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 18V5l11-2v13" />
              <circle cx="6" cy="18" r="3" />
              <circle cx="17" cy="16" r="3" />
            </svg>
            <span>Đang phát</span>
          </a>
          <a href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z" />
            </svg>
            <span>Yêu thích</span>
          </a>
          <a href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <circle cx="12" cy="12" r="2" />
              <path d="M16 8h.01" />
            </svg>
            <span>Album</span>
          </a>
          <a href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Cá nhân</span>
          </a>
        </nav>
      </section>

      <audio id="audioPlayer" preload="auto" loop>
        <source src="assets/audio/nhacnen.mp3" type="audio/mpeg" />
        Trình duyệt của bạn không hỗ trợ phát audio.
      </audio>
    </main>

    <script src="script.js"></script>
  </body>
</html>
